<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>Verification Code - BSPBlueprint</title>
</head>
<body style="margin: 0; padding: 0; font-family: Arial, sans-serif; background-color: #f5f5f5; line-height: 1.6;">
    <!-- Wrapper Table -->
    <table role="presentation" cellspacing="0" cellpadding="0" border="0" width="100%" style="background-color: #f5f5f5;">
        <tr>
            <td align="center" style="padding: 40px 20px;">
                <!-- Main Container Table -->
                <table role="presentation" cellspacing="0" cellpadding="0" border="0" width="550" style="max-width: 550px; background-color: #ffffff; border-radius: 8px; overflow: hidden;">
                    <!-- Header -->
                    <tr>
                        <td style="background: linear-gradient(86deg, #C44755 -72.64%, #1A272E 53.39%, #2F8F6B 178.29%); padding: 33.45px; text-align: center; border-radius: 20.91px 20.91px 0 0;">
                            <table role="presentation" cellspacing="0" cellpadding="0" border="0" width="100%">
                                <tr>
                                    <td align="center" style="padding: 0;">
                                        <!-- Logo Container -->
                                        <table role="presentation" cellspacing="0" cellpadding="0" border="0" style="margin: 0 auto;">
                                            <tr>
                                                <td style="padding: 0 5px 0 0; vertical-align: middle;">
                                                    <!-- Logo Grid - Using nested tables instead of CSS Grid -->
                                                    <table role="presentation" cellspacing="0" cellpadding="0" border="0" width="40" height="40">
                                                        <tr>
                                                            <td width="20" height="20" style="background-color: #ffffff;"></td>
                                                            <td width="20" height="20" style="background-color: #4CAF50;"></td>
                                                        </tr>
                                                        <tr>
                                                            <td width="20" height="20" style="background-color: #F44336;"></td>
                                                            <td width="20" height="20" style="background-color: #2196F3;"></td>
                                                        </tr>
                                                    </table>
                                                </td>
                                                <td style="padding: 0; vertical-align: middle;">
                                                    <span style="color: #ffffff; font-size: 24px; font-weight: 600; letter-spacing: 0.5px;">BSPBlueprint</span>
                                                </td>
                                            </tr>
                                        </table>
                                    </td>
                                </tr>
                            </table>
                        </td>
                    </tr>
                    
                    <!-- Main Content -->
                    <tr>
                        <td style="padding: 30px 40px; text-align: center;">
                            <h1 style="margin: 0 0 10px 0; padding: 0; font-weight: 600; font-size: 20px; line-height: 25px; color: #2F414A;">Verification Code</h1>
                            <p style="margin: 0 0 30px 0; padding: 0; font-weight: 400; font-size: 14px; line-height: 21px; color: #385966;">This code is valid for the next 10 minutes.</p>
                            <div style="font-weight: 700; font-size: 50px; line-height: 60px; color: #2F414A; margin-top: 20px; margin-bottom: 0;">123-457</div>
                        </td>
                    </tr>
                    
                    <!-- Footer with border-top separator (most reliable for mobile) -->
                    <tr>
                        <td style="padding: 40px 40px; text-align: center; border-top: 1px solid #DDD9EB;">
                            <p style="margin: 0; padding: 0; font-size: 14px; color: #385966; line-height: 1.6;">
                                In case you didn't triggered this, please connect our 
                                <a href="mailto:support@bspblueprint.com" style="color: #3A6FD8; text-decoration: none;">Support Team</a>
                            </p>
                        </td>
                    </tr>
                </table>
            </td>
        </tr>
    </table>
</body>
</html>
